<!doctype html>
<html lang="da">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Beat Manager — Boat Note</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg-0:#0D0D0D;
    --bg-1:#141414;
    --bg-2:#1A1A1A;
    --bg-3:#222222;
    --bg-hover:#2A2A2A;
    --border:#2A2A2A;
    --border-strong:#333333;
    --text:#FFFFFF;
    --text-2:#B8B8B8;
    --text-3:#7A7A7A;
    --text-4:#555555;
    --blue:#4A90D9;
    --blue-soft:rgba(74,144,217,.14);
    --red:#E84855;
    --red-soft:rgba(232,72,85,.14);
    --green:#2ECC71;
    --green-soft:rgba(46,204,113,.14);
    --yellow:#F39C12;
    --yellow-soft:rgba(243,156,18,.14);
    --gray:#666666;
    --gray-soft:rgba(120,120,120,.16);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg-0);color:var(--text);font-family:'Inter',system-ui,sans-serif;font-feature-settings:"ss01","cv11";-webkit-font-smoothing:antialiased}
  body{min-height:100vh;overflow-x:hidden}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:6px}
  ::-webkit-scrollbar-thumb:hover{background:#3a3a3a}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,textarea,select{font-family:inherit}
  a{color:inherit;text-decoration:none}
  .mono{font-family:'JetBrains Mono',monospace;font-feature-settings:"ss01"}
  .row{display:flex}
  .col{display:flex;flex-direction:column}
  .gap-2{gap:8px}.gap-3{gap:12px}.gap-4{gap:16px}.gap-6{gap:24px}.gap-8{gap:32px}
  .grow{flex:1}
  .center{display:flex;align-items:center;justify-content:center}
  @keyframes bn-bar{0%{left:-40%}100%{left:100%}}
</style>
</head>
<body>
<div id="root"></div>
<script type="module" src="/src/main.jsx"></script>
</body>
</html>
